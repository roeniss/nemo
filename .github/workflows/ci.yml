name: CI

on:
  push:
    branches: [main]
  pull_request:

# auto-cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  WRANGLER_SEND_METRICS: "false"
  # test credentials for the local dev worker (not real secrets)
  TEST_USER: ci-user
  TEST_PASS: ci-pass

jobs:
  unit:
    name: typecheck + unit + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # enforces the 95% coverage thresholds in vitest.config.ts — fails the
      # build (and so blocks deploy) if any metric drops below 95%
      - run: npm run test:coverage

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      - name: Write local dev secrets
        run: |
          # AUTH_PASS must be a PBKDF2 hash of the login password, not plaintext —
          # the worker fails closed on a non-hash secret.
          AUTH_PASS_HASH=$(printf '%s' "$TEST_PASS" | node scripts/hash-password.mjs)
          printf 'AUTH_USER=%s\nAUTH_PASS=%s\nJWT_SECRET=%s\n' \
            "$TEST_USER" "$AUTH_PASS_HASH" "ci-jwt-secret-not-real" > .dev.vars
          # short history thresholds so the session-snapshot e2e can cross a
          # "session boundary" with a brief wait instead of the 1h prod default
          printf 'HISTORY_GAP_MS=1000\nHISTORY_SESSION_MS=1000\n' >> .dev.vars
      - name: Run e2e
        run: npm run test:e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
