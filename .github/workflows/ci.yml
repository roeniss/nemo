name: CI

on:
  push:
    branches: [main]
  pull_request:

# auto-cancel superseded runs on the same ref
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  WRANGLER_SEND_METRICS: "false"
  # test credentials for the local dev worker (not real secrets)
  TEST_USER: ci-user
  TEST_PASS: ci-pass

jobs:
  unit:
    name: typecheck + unit + coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      # enforces the 95% coverage thresholds in vitest.config.ts — fails the
      # build (and so blocks deploy) if any metric drops below 95%
      - run: npm run test:coverage

  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      - name: Write local dev secrets
        run: |
          # The worker authenticates against the users table, not AUTH_* env
          # vars, so the login user is seeded into the local D1 by the playwright
          # webServer command (db:seed-test-user, using TEST_USER/TEST_PASS).
          # Only JWT_SECRET (cookie signing) is still needed in .dev.vars.
          printf 'JWT_SECRET=%s\n' "ci-jwt-secret-not-real" > .dev.vars
      - name: Run e2e
        run: npm run test:e2e
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
