name: Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

# auto-cancel superseded preview builds on the same PR
concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

env:
  WRANGLER_SEND_METRICS: "false"

jobs:
  preview:
    name: deploy preview
    runs-on: ubuntu-latest
    # secrets aren't exposed to PRs from forks, so skip those (no preview possible)
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # Upload a non-traffic-serving version aliased to this PR. NOTE: deliberately
      # does NOT run `npm run db:remote` — previews share the prod D1 and must not
      # touch its schema. Only the real `main` deploy migrates.
      - name: Build & upload preview version
        id: upload
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_TURNSTILE_SITEKEY: ${{ vars.VITE_TURNSTILE_SITEKEY }}
          PR: ${{ github.event.number }}
          # optional deterministic fallback if stdout parsing ever fails
          WORKERS_SUBDOMAIN: ${{ vars.WORKERS_SUBDOMAIN }}
        run: |
          set -euo pipefail
          npm run preview:upload -- --preview-alias "pr-${PR}" 2>&1 | tee upload.log
          # alias URL format is <alias>-<worker>.<subdomain>.workers.dev — e.g.
          # https://pr-34-nemo.roeniss2.workers.dev (note the dot before the subdomain)
          url="$(grep -oE "https://pr-${PR}-[a-z0-9.-]+\.workers\.dev" upload.log | head -n1 || true)"
          if [ -z "$url" ] && [ -n "${WORKERS_SUBDOMAIN:-}" ]; then
            url="https://pr-${PR}-nemo.${WORKERS_SUBDOMAIN}.workers.dev"
          fi
          if [ -z "$url" ]; then
            echo "::error::Could not determine preview URL from wrangler output" >&2
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Upsert preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const url = ${{ toJSON(steps.upload.outputs.url) }};
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const marker = '<!-- preview-url -->';
            const body = [
              marker,
              '### ⚡ Preview deployment',
              '',
              `**${url}**`,
              '',
              `Deployed commit \`${sha}\`. Updates on every push.`,
              '',
              '> ⚠️ Shares the **production** database — writes hit live data.',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
